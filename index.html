<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        p { color: #666; font-size: 18px; }
    </style>
</head>
<body>
<div class="box">
    <h1 id="title">နှုတ်ခွန်းဆက်သခြင်း</h1>
    <button onclick="sayHello()">နှိပ်ကြည့်ပါ</button>
</div>

<script>
    function sayHello() {
        // ၁။ Variable တစ်ခု ဆောက်လိုက်တယ်
        let name = "သူငယ်ချင်း"; 
        
        // ၂။ အဲဒီ Variable ကို သုံးပြီး Website က စာသားကို ပြောင်းလိုက်မယ်
        document.getElementById("title").innerHTML = "မင်္ဂလာပါ " + name + " ရေ...";
    }
</script>
</body>
</html>
