<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        p { color: #666; font-size: 18px; }
    </style>
</head>
<body>
<div class="box">
    <h2>ဂဏန်းမှန်းတမ်း ကစားကြမယ်</h2>
    <p>၁ ကနေ ၁၀ ကြားထဲက ဂဏန်းတစ်ခု ရိုက်ထည့်ပါ</p>
    
    <input type="number" id="userInput" placeholder="ဂဏန်းရိုက်ပါ">
    <button onclick="checkNumber()">စစ်ဆေးမယ်</button>
    
    <h3 id="result"></h3>
</div>

<script>
    function checkNumber() {
        // ၁။ User ရိုက်လိုက်တဲ့ ဂဏန်းကို ဗူးထဲထည့်မယ်
        let guess = document.getElementById("userInput").value;
        let secretNum = 7; // ကျွန်တော်တို့ သတ်မှတ်ထားတဲ့ လျှို့ဝှက်နံပါတ်
        
        // ၂။ If-Else နဲ့ စစ်ဆေးမယ်
        if (guess == secretNum) {
            document.getElementById("result").innerHTML = "မှန်သွားပြီ! တော်လိုက်တာ။ 🥳";
            document.getElementById("result").style.color = "green";
        } else {
            document.getElementById("result").innerHTML = "မှားသွားပြီ၊ ပြန်ကြိုးစားကြည့်ပါ။ ❌";
            document.getElementById("result").style.color = "red";
        }
    }
</script>
</body>
</html>
